<div class="container mt-4">
    @if (member) {
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">{{ isNew ? 'Add New Member' : 'Edit Member Profile' }}</h3>
            </div>

            <div class="card-body">
                <form #memberForm="ngForm" (ngSubmit)="saveMember()">
                    <div class="row g-3">
                        <!-- First Name -->
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" [(ngModel)]="member.firstName" name="firstName" required #fName="ngModel">
                            <div [hidden]="fName.valid || fName.pristine" class="text-danger small">First name is required.</div>
                        </div>

                        <!-- Last Name -->
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" [(ngModel)]="member.lastName" name="lastName" required #lName="ngModel">
                            <div [hidden]="lName.valid || lName.pristine" class="text-danger small">Last name is required.</div>
                        </div>

                        <!-- Sex & Age -->
                        <div class="col-md-4">
                            <label class="form-label">Sex</label>
                            <select class="form-select" [(ngModel)]="member.sex" name="sex">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" [(ngModel)]="member.age" name="age">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" [(ngModel)]="member.email" name="email">
                        </div>

                        <!-- Dates -->
                        <div class="col-md-6">
                            <label class="form-label">Registration Date</label>
                            <input type="date" class="form-control" [(ngModel)]="member.registerDate" name="registerDate">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Expiration Date</label>
                            <input type="date" class="form-control" [(ngModel)]="member.expirationDate" name="expirationDate">
                        </div>

                        <!-- Notes -->
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" [(ngModel)]="member.notes" name="notes" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-4 pt-3 border-top d-flex gap-2">
                        <button type="button" class="btn btn-secondary" [routerLink]="['/members']">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-success px-4" [disabled]="!memberForm.form.valid">
                            <i class="bi bi-save"></i> Save Member
                        </button>
                    </div>
                </form>
            </div>
        </div>
    } @else {
        <div class="text-center mt-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading member data...</p>
        </div>
    }
</div>
