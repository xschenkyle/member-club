<div class="container mt-4">
    <!-- Header with Flexbox for Alignment -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Club Member List</h2>
        <button [routerLink]="['/member-detail/new']" class="btn btn-success shadow-sm">
            <i class="bi bi-person-plus-fill me-1"></i> Add New Member
        </button>
    </div>

    <!-- Responsive Table Card -->
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">First Name</th>
                    <th>Last Name</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                    @for (m of members; track $index) {
                        <tr>
                            <td class="ps-4">{{ m.firstName }}</td>
                            <td>{{ m.lastName }}</td>
                            <td class="text-center">
                                <a [routerLink]="['/member-detail', m.id]" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-pencil-square me-1"></i> View/Modify
                                </a>
                            </td>
                        </tr>
                    } @empty {
                        <tr>
                            <td colspan="3" class="text-center py-5">
                                <div class="text-muted">
                                    <i class="bi bi-people fs-1 d-block mb-2"></i>
                                    <p class="mb-0">No members found in the system.</p>
                                </div>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
