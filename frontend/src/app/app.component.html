<!-- Only show the Nav Bar if the user is authenticated -->
@if (authService.isAuthenticated()) {
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" [routerLink]="['/members']">
                <i class="bi bi-shield-lock-fill me-2"></i>Member Club
            </a>

            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">Logged in as Admin</span>
                <button (click)="onLogout()" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </div>
        </div>
    </nav>
    <div class="container mb-4">
      <app-search></app-search>
    </div>
}

<router-outlet></router-outlet>
